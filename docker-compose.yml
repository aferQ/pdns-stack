services:
  db:
    image: mariadb:10.11
    container_name: pdns-db
    environment:
      MYSQL_ROOT_PASSWORD: zaq1@WSX
      MYSQL_DATABASE: pdns
      MYSQL_USER: pdns
      MYSQL_PASSWORD: test
    volumes:
      - db-data:/var/lib/mysql
      - ./db-init/init.sql:/docker-entrypoint-initdb.d
  powerdns-auth-master:
    container_name: pdns-auth
    build: 
      context: ./pdns-auth
      dockerfile: Dockerfile.auth
    depends_on:
      - db
    ports:
      - "5300:53/udp"
      - "5300:53/tcp"
      - "8081:8081"  # API access for PowerDNS-Admin
    volumes:
      - pdns-data:/data
      - ./pdns-auth/pdns.conf:/etc/powerdns/pdns.conf
    restart: always
  powerdns-admin:
    container_name: pdns-admin
    build:
      context: .
      dockerfile: Dockerfile.admin
    environment:
      - SQLALCHEMY_DATABASE_URI=mysql+pymysql://pdns:test@db/powerdnsadmin
      - PDNS_API_URL=http://pdns-auth-master:8081
      - PDNS_API_KEY=supersecretkey
      - ADMIN_PASSWORD=admin
    ports:
      - "9191:80"
    depends_on:
      - db
      - powerdns-auth-master
    restart: always
  powerdns-recursor:
    container_name: pdns-rec
    build: 
      context: ./pdns-rec
      dockerfile: Dockerfile.recursor
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    volumes:
      - ./pdns-rec/recursor.yml:/etc/powerdns/recursor.yml
volumes:
  db-data:
  pdns-data:
